[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = driver://user:pass@host/dbname  # placeholder; real value injected by env.py from Settings

[post_write_hooks]
# Format new migration files with ruff.
# Use type=exec (not console_scripts): ruff >= 0.15 stopped registering a
# `console_scripts.ruff` entry point, so the older console_scripts config
# fails with "Could not find entrypoint console_scripts.ruff". The exec
# runner spawns `ruff` as a subprocess and relies on PATH resolution.
#
# Prereq: the venv that runs `alembic revision` must have its Scripts/bin
# dir on PATH so the subprocess resolves to .venv/Scripts/ruff.exe. The
# usual `.venv\Scripts\activate` (or `source .venv/bin/activate`) suffices.
# Without activation, the hook fails fast and prints the resolution error;
# the revision file is still generated, just unformatted -- run ruff
# manually or re-run alembic with the venv activated.
#
# Keep this file ASCII-only: Windows Python reads alembic.ini via locale
# encoding (GBK on zh-CN), and non-ASCII chars trip UnicodeDecodeError.
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
